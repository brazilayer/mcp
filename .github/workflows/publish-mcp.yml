name: Publish to MCP Registry

on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # criar a release com o artefato .mcpb
  id-token: write   # OIDC para o mcp-publisher

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with: { node-version: "lts/*" }

      - name: Build single-file bundle
        run: |
          npm ci
          npx esbuild servidor.ts --bundle --platform=node --format=esm --target=node18 \
            --outfile=dist/index.mjs \
            --banner:js="import { createRequire } from 'node:module'; const require = createRequire(import.meta.url);"

      - name: Pack MCPB
        run: npx @anthropic-ai/mcpb pack . brazilayer-mcp.mcpb

      - name: Create GitHub release with artifact
        env: { GH_TOKEN: "${{ github.token }}" }
        run: gh release create "${{ github.ref_name }}" brazilayer-mcp.mcpb --title "${{ github.ref_name }}" --notes "MCPB bundle for one-click install + MCP Registry artifact."

      - name: Finalize server.json (URL da tag + sha256 real)
        run: |
          SHA=$(openssl dgst -sha256 brazilayer-mcp.mcpb | awk '{print $2}')
          URL="https://github.com/brazilayer/mcp/releases/download/${{ github.ref_name }}/brazilayer-mcp.mcpb"
          VERSAO="${GITHUB_REF_NAME#v}"
          jq --arg sha "$SHA" --arg url "$URL" --arg v "$VERSAO" \
            '.version=$v | .packages[0].fileSha256=$sha | .packages[0].identifier=$url' \
            server.json > server.final.json && mv server.final.json server.json
          cat server.json

      - name: Install mcp-publisher
        run: curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Publish to MCP Registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
